<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TESSBOT</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>TESSBOT</h1>
<p class="subtitle">생각을 이어주는 챗봇</p>

<div id="chatBox">

<div class="msg bot">
안녕하세요. 저는 TESSBOT입니다.

정답을 제공하기보다 질문을 통해 생각을 확장하는 철학 탐구 도우미입니다.

탐구 주제:
• 행복
• 공리주의
• 도덕적 고려의 범위
</div>

</div>


<div class="inputArea">
<input id="questionInput" type="text" placeholder="질문을 입력하세요..." />
<button id="sendBtn">전송</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
